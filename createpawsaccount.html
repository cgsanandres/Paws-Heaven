
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Paws Haven | Create Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{font-family:Arial; box-sizing:border-box;}

body{
margin:0;
background:#FFF8F0;
color:#4B3A2F;
transition:0.3s;
}

/* NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
background:#7FB77E;
color:white;
flex-wrap:wrap;
}

.logo{
font-size:22px;
font-weight:bold;
}

.navlinks a{
margin:0 10px;
text-decoration:none;
color:white;
font-size:14px;
}

.navlinks a:hover{
text-decoration:underline;
}

/* PAGE CONTENT */
.container{
display:flex;
justify-content:center;
align-items:center;
padding:50px 20px;
}

.account-box{
background:white;
padding:35px;
border-radius:10px;
width:100%;
max-width:400px;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

.account-box h2{
text-align:center;
color:#7FB77E;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
background:#7FB77E;
color:white;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#6aa56a;
}

/* MOBILE */
@media(max-width:600px){
.navbar{
flex-direction:column;
align-items:flex-start;
}
.navlinks{
margin-top:10px;
}
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<div class="logo">🐾 Paws Haven</div>
<div class="navlinks">
<a href="pawshome.html">Home</a>
<a href="pawsanimals.html">Animals</a>
<a href="pawsadopt.html">Adopt</a>
<a href="pawsdonate.html">Donate</a>
<a href="pawsvolunteer.html">Volunteer</a>
<a href="pawsgallery.html">Gallery</a>
<a href="pawsabout.html">About</a>
<a href="pawscontact.html">Contact</a>
<a href="pawsaccount.html">Account</a>
<a onclick="logout()">Logout</a>
</div>
</div>

<!-- CREATE ACCOUNT FORM -->
<div class="container">
<div class="account-box">
<h2>Create Your Account</h2>
<input id="email" type="email" placeholder="Email Address" required>
<input id="password" type="password" placeholder="Password" required>
<button onclick="createAccount()">Create Account</button>
<p style="text-align:center;margin-top:15px;">
Already have an account? <a href="pawslogin.html" style="color:#7FB77E;">Login</a>
</p>
</div>
</div>

<script>
// CREATE ACCOUNT FUNCTION
function createAccount(){
let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;

if(email==="" || pass===""){
alert("Please fill in all fields");
return;
}

localStorage.setItem("pawsEmail",email);
localStorage.setItem("pawsPass",pass);

alert("Account created! You can now login.");
window.location.href="pawslogin.html";
}

// LOGOUT FUNCTION
function logout(){
localStorage.removeItem("pawsLoggedIn");
alert("You have been logged out.");
window.location.href="pawslogin.html";
}
</script>

</body>
</html>
