<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Paws Haven | Account</title>

<style>

*{
font-family:Arial;
box-sizing:border-box;
}

body{
margin:0;
background:#FFF8F0;
color:#4B3A2F;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
background:#7FB77E;
color:white;
flex-wrap:wrap;
}

.logo{
font-size:22px;
font-weight:bold;
}

.navlinks a{
margin:0 10px;
text-decoration:none;
color:white;
font-size:14px;
cursor:pointer;
}

.navlinks a:hover{
text-decoration:underline;
}

/* PAGE */

.container{
padding:40px 20px;
max-width:900px;
margin:auto;
}

/* ACCOUNT CARD */

.account-card{
background:white;
padding:35px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

.account-card h2{
color:#7FB77E;
margin-bottom:20px;
}

/* ACCOUNT INFO */

.info{
margin:15px 0;
font-size:16px;
}

.status{
color:#7FB77E;
font-weight:bold;
}

/* DASHBOARD */

.dashboard{
margin-top:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.box{
background:#F5E6D3;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.box h3{
margin-bottom:10px;
color:#7FB77E;
}

.box p{
font-size:14px;
}

/* BUTTON */

button{
margin-top:20px;
padding:12px 20px;
border:none;
background:#7FB77E;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#6aa56a;
}

/* MOBILE */

@media(max-width:600px){

.navbar{
flex-direction:column;
align-items:flex-start;
}

.navlinks{
margin-top:10px;
}

}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">🐾 Paws Haven</div>

<div class="navlinks">

<a href="pawshome.html">Home</a>
<a href="pawsanimals.html">Animals</a>
<a href="pawsadopt.html">Adopt</a>
<a href="pawsdonate.html">Donate</a>
<a href="pawsvolunteer.html">Volunteer</a>
<a href="pawsgallery.html">Gallery</a>
<a href="pawsabout.html">About</a>
<a href="pawscontact.html">Contact</a>
<a href="pawsaccount.html">Account</a>
<a onclick="logout()">Logout</a>

</div>

</div>

<!-- ACCOUNT CONTENT -->

<div class="container">

<div class="account-card">

<h2>Your Account</h2>

<div class="info">
Email: <span id="userEmail"></span>
</div>

<div class="info">
Login Status: <span class="status" id="status"></span>
</div>

<button onclick="logout()">Logout</button>

<!-- USER DASHBOARD -->

<div class="dashboard">

<div class="box">
<h3>Saved Pets</h3>
<p>Animals you marked as favorites will appear here.</p>
</div>

<div class="box">
<h3>Adoption Requests</h3>
<p>Track the pets you applied to adopt.</p>
</div>

<div class="box">
<h3>Volunteer Activity</h3>
<p>See your upcoming volunteer events.</p>
</div>

</div>

</div>

</div>

<script>

/* CHECK LOGIN */

if(localStorage.getItem("pawsLoggedIn")!=="true"){

window.location.href="pawslogin.html";

}

/* SHOW ACCOUNT INFO */

document.getElementById("userEmail").innerText =
localStorage.getItem("pawsEmail");

document.getElementById("status").innerText =
"Logged In";

/* LOGOUT */

function logout(){

localStorage.removeItem("pawsLoggedIn");

alert("You have been logged out.");

window.location.href="pawslogin.html";

}

</script>

</body>
</html>
