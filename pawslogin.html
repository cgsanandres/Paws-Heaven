
<!DOCTYPE html>
<html>
<head>

<title>Paws Haven | Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
font-family:Arial;
box-sizing:border-box;
}

body{
margin:0;
background:#FFF8F0;
color:#4B3A2F;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 30px;
background:#7FB77E;
color:white;
flex-wrap:wrap;
}

.logo{
font-size:22px;
font-weight:bold;
}

.navlinks a{
margin:0 10px;
text-decoration:none;
color:white;
font-size:14px;
}

.navlinks a:hover{
text-decoration:underline;
}

/* PAGE */

.container{
display:flex;
justify-content:center;
align-items:center;
padding:50px 20px;
}

.loginbox{
background:white;
padding:35px;
border-radius:10px;
width:100%;
max-width:400px;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

.loginbox h2{
text-align:center;
color:#7FB77E;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
background:#7FB77E;
color:white;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#6aa56a;
}

.create{
margin-top:20px;
padding-top:15px;
border-top:1px solid #eee;
}

.create h3{
margin-bottom:10px;
color:#7FB77E;
}

/* MOBILE */

@media(max-width:600px){

.navbar{
flex-direction:column;
align-items:flex-start;
}

.navlinks{
margin-top:10px;
}

}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">🐾 Paws Haven</div>

<div class="navlinks">
<a href="pawshome.html">Home</a>
<a href="pawsanimals.html">Animals</a>
<a href="pawsadopt.html">Adopt</a>
<a href="pawsdonate.html">Donate</a>
<a href="pawsvolunteer.html">Volunteer</a>
<a href="pawsgallery.html">Gallery</a>
<a href="pawsabout.html">About</a>
<a href="pawscontact.html">Contact</a>
<a href="pawsaccount.html">Account</a>
<a onclick="logout()">Logout</a>
</div>

</div>

<div class="container">

<div class="loginbox">

<h2>Login to Paws Haven</h2>

<input id="email" type="email" placeholder="Email Address">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<div class="create">

<h3>Create Account</h3>

<input id="newEmail" type="email" placeholder="Email Address">
<input id="newPass" type="password" placeholder="Password">

<button onclick="createAccount()">Create Account</button>

</div>

</div>

</div>

<script>

/* LOGIN */

function login(){

let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;

let savedEmail=localStorage.getItem("pawsEmail");
let savedPass=localStorage.getItem("pawsPass");

if(email===savedEmail && pass===savedPass){

localStorage.setItem("pawsLoggedIn","true");

alert("Login successful!");

window.location.href="pawshome.html";

}
else{
alert("Incorrect email or password");
}

}

/* CREATE ACCOUNT */

function createAccount(){

let email=document.getElementById("newEmail").value;
let pass=document.getElementById("newPass").value;

if(email==="" || pass===""){
alert("Please fill all fields");
return;
}

localStorage.setItem("pawsEmail",email);
localStorage.setItem("pawsPass",pass);

alert("Account created! You can now login.");

}

/* LOGOUT */

function logout(){

localStorage.removeItem("pawsLoggedIn");

alert("You have been logged out.");

window.location.href="pawslogin.html";

}

</script>

</body>
</html>
